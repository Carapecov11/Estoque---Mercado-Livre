<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Estoque</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="favicon/favicon-96x96.png">
    <link rel="shortcut icon" href="favicon/favicon.ico">
    <link rel="apple-touch-icon" href="favicon/apple-touch-icon.png">
    <link rel="manifest" href="favicon/site.webmanifest">
</head>
<body>

<header>

    <img src="Logo/mercado-livre.png" alt="Mercado Livre">

    <div class="acoes">

        <button class="btn-sair" onclick="logout()">
            Sair
        </button>

        <button
            class="btn-relatorio"
            onclick="window.location.href='historico.html'">
            Relatório
        </button>

    </div>

</header>

<main>

    <div class="card">

        <h2>Cadastrar Produto</h2>

        <input id="sku" placeholder="SKU">
        <input id="nome" placeholder="Nome">
        <input id="estoque" type="number" placeholder="Estoque">
        <input id="preco" type="number" placeholder="Preço">

        <button onclick="cadastrarProduto()">
            Cadastrar
        </button>

    </div>

    <div class="card">

        <h2>Venda (Saída)</h2>

        <input id="skuVenda" placeholder="SKU">
        <input id="qtdVenda" type="number" placeholder="Quantidade">

        <button onclick="vender()">
            Vender
        </button>

    </div>

    <div class="card">

        <h2>Entrada de Estoque</h2>

        <input id="skuEntrada" placeholder="SKU">
        <input id="qtdEntrada" type="number" placeholder="Quantidade">

        <button onclick="entrada()">
            Adicionar
        </button>

    </div>

    <div class="card">

        <h2>Produtos</h2>

        <button onclick="listarProdutos()">
            Atualizar Lista
        </button>

        <br><br>

        <ul id="listaProdutos"></ul>

    </div>

</main>

<script src="script.js"></script>

</body>
</html>
